# Nixpacks plan for Coolify and other Nixpacks-based deploys.
# Runs the Express + WebSocket server which also serves the built SPA.

[variables]
NODE_ENV = "production"

[phases.install]
cacheDirectories = ["~/.npm", "node_modules/.cache"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build"]

[start]
cmd = "node server.mjs"
